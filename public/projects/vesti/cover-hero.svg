  <text x="69" y="345" fill="#141824" font-size="72" font-weight="700" font-family="Arial, Helvetica, sans-serif">for AI</text>
  <text x="69" y="420" fill="#141824" font-size="72" font-weight="700" font-family="Arial, Helvetica, sans-serif">conversations.</text>

  <text x="69" y="495" fill="#6F685E" font-size="32" font-family="monospace">The memory system that keeps the work you do with</text>
  <text x="69" y="535" fill="#6F685E" font-size="32" font-family="monospace">AI searchable, structured, and close at hand.</text>
  <text x="69" y="628" fill="#6F685E" font-size="32" font-family="monospace">Capture prompts, dead ends, references, and</text>
  <text x="69" y="668" fill="#6F685E" font-size="32" font-family="monospace">decisions without changing your tools, your tabs,</text>
  <text x="69" y="708" fill="#6F685E" font-size="32" font-family="monospace">or your workflow.</text>

